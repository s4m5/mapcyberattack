# Конфигурация Nginx для фронтенда Карта Киберугроз
# Раздача статики и проксирование API запросов на бэкенд

server {
    listen 80;                              # Порт для HTTP соединений
    server_name localhost;                  # Имя сервера
    
    # Корневая директория со статическими файлами React приложения
    root /usr/share/nginx/html;
    index index.html;                       # Файл по умолчанию
    
    # Сжатие gzip для уменьшения размера передаваемых данных
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    
    # Кэширование статических файлов
    location ~* \.(jpg|jpeg|png|gif|ico|svg|css|js|woff|woff2)$ {
        expires 1y;                         # Кэшировать 1 год
        add_header Cache-Control "public, immutable";
    }
    
    # Основной location для SPA (Single Page Application)
    location / {
        try_files $uri $uri/ /index.html;   # Если файл не найден, отдавать index.html для клиентской маршрутизации
    }
    
    # Проксирование API запросов на бэкенд Django
    location /api/ {
        proxy_pass http://backend:8000;     # URL бэкенд сервиса в Docker сети
        proxy_set_header Host $host;        # Передача оригинального хоста
        proxy_set_header X-Real-IP $remote_addr;  # Передача реального IP клиента
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # Передача цепочки IP
        proxy_set_header X-Forwarded-Proto $scheme;  # Передача протокола (http/https)
        
        # Таймауты для долгоживущих соединений
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # Проксирование WebSocket соединений (если понадобятся)
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
    
    # Страницы ошибок
    error_page 404 /index.html;             # Для SPA обрабатываем 404 через index.html
    error_page 500 502 503 504 /50x.html;   # Стандартные страницы ошибок Nginx
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
