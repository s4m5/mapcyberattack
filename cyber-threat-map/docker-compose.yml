# Docker Compose конфигурация для проекта Интерактивная Карта Киберугроз
# Определяет все сервисы необходимые для работы приложения

version: '3.8'  # Версия формата Docker Compose

services:
  # Сервис базы данных PostgreSQL
  db:
    image: postgres:15-alpine  # Образ PostgreSQL версии 15 (легковесный Alpine)
    container_name: cyber_db  # Имя контейнера
    restart: unless-stopped  # Автоматический перезапуск если контейнер остановлен не пользователем
    environment:  # Переменные окружения для PostgreSQL
      POSTGRES_DB: cyber_threat_map  # Имя базы данных
      POSTGRES_USER: cyber_user  # Имя пользователя БД
      POSTGRES_PASSWORD: secure_password_change_me  # Пароль БД (измените в продакшене!)
    volumes:  # Том для сохранения данных БД
      - postgres_data:/var/lib/postgresql/data  # Сохранение данных между перезапусками
    networks:  # Сеть для связи с другими сервисами
      - cyber_network
    healthcheck:  # Проверка работоспособности БД
      test: ["CMD-SHELL", "pg_isready -U cyber_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Сервис Redis для кэширования и WebSocket каналов
  redis:
    image: redis:7-alpine  # Образ Redis версии 7 (легковесный Alpine)
    container_name: cyber_redis  # Имя контейнера
    restart: unless-stopped  # Автоматический перезапуск
    command: redis-server --appendonly yes  # Запуск с сохранением на диск (AOF)
    volumes:  # Том для сохранения данных Redis
      - redis_data:/data
    networks:  # Сеть для связи с другими сервисами
      - cyber_network
    healthcheck:  # Проверка работоспособности Redis
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Сервис бэкенда Django
  backend:
    build:  # Настройки сборки образа
      context: ./backend  # Контекст сборки (директория с Dockerfile)
      dockerfile: Dockerfile  # Имя файла Dockerfile
    container_name: cyber_backend  # Имя контейнера
    restart: unless-stopped  # Автоматический перезапуск
    depends_on:  # Зависимости от других сервисов
      db:  # База данных должна быть запущена
        condition: service_healthy  # Ждем пока БД станет здоровой
      redis:  # Redis должен быть запущен
        condition: service_healthy  # Ждем пока Redis станет здоровым
    environment:  # Переменные окружения для Django
      DEBUG: "False"  # Режим отладки выключен (в продакшене)
      DJANGO_SETTINGS_MODULE: cyber_threat_map.settings  # Файл настроек Django
      DB_NAME: cyber_threat_map  # Имя базы данных
      DB_USER: cyber_user  # Пользователь БД
      DB_PASSWORD: secure_password_change_me  # Пароль БД
      DB_HOST: db  # Хост БД (имя сервиса Docker)
      DB_PORT: 5432  # Порт БД
      REDIS_URL: redis://redis:6379/0  # URL подключения к Redis
      SECRET_KEY: change-me-in-production-secure-random-key  # Секретный ключ Django (измените!)
      ALLOWED_HOSTS: "*"  # Разрешенные хосты (настройте для продакшена)
    volumes:  # Том для монтирования кода (для разработки)
      - ./backend:/app  # Монтируем исходный код в контейнер
      - backend_staticfiles:/app/staticfiles  # Том для статических файлов
      - backend_logs:/app/logs  # Том для логов приложения
    networks:  # Сеть для связи с другими сервисами
      - cyber_network
    command: >  # Команда запуска (переопределяет CMD из Dockerfile)
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn --workers 3 --bind 0.0.0.0:8000 cyber_threat_map.wsgi:application"
    expose:  # Порты доступные внутри сети Docker
      - "8000"

  # Сервис мониторинга логов (парсер syslog)
  log_monitor:
    build:  # Настройки сборки образа
      context: ./backend  # Контекст сборки
      dockerfile: Dockerfile  # Файл Dockerfile
    container_name: cyber_log_monitor  # Имя контейнера
    restart: unless-stopped  # Автоматический перезапуск
    depends_on:  # Зависимости от других сервисов
      - backend  # Бэкенд должен быть запущен
    environment:  # Переменные окружения
      DJANGO_SETTINGS_MODULE: cyber_threat_map.settings  # Настройки Django
      SYSLOG_FILE: /var/log/syslog  # Путь к syslog (монтируется через volume)
      POLL_INTERVAL: "5"  # Интервал опроса логов в секундах
    volumes:  # Том для доступа к системным логам
      - /var/log:/host_logs:ro  # Монтируем системные логи только для чтения
      - ./backend:/app  # Монтируем код приложения
    networks:  # Сеть для связи с другими сервисами
      - cyber_network
    command: >  # Команда запуска монитора логов
      sh -c "python manage.py run_monitor"
    privileged: true  # Привилегированный режим для доступа к логам

  # Сервис фронтенда React (Nginx для раздачи статики)
  frontend:
    build:  # Настройки сборки образа
      context: ./frontend  # Контекст сборки (директория фронтенда)
      dockerfile: Dockerfile  # Файл Dockerfile
      args:  # Аргументы сборки
        REACT_APP_API_URL: http://localhost:8000/api  # URL API для фронтенда
    container_name: cyber_frontend  # Имя контейнера
    restart: unless-stopped  # Автоматический перезапуск
    depends_on:  # Зависимости от других сервисов
      - backend  # Бэкенд должен быть запущен
    ports:  # Публикуемые порты (хост:контейнер)
      - "80:80"  # Порт 80 на хосте -> порт 80 в контейнере
      - "443:443"  # Порт 443 для HTTPS (если настроен)
    volumes:  # Том для конфигурации Nginx
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro  # Конфигурация Nginx
    networks:  # Сеть для связи с другими сервисами
      - cyber_network

  # Сервис Celery для фоновых задач
  celery_worker:
    build:  # Настройки сборки образа
      context: ./backend  # Контекст сборки
      dockerfile: Dockerfile  # Файл Dockerfile
    container_name: cyber_celery  # Имя контейнера
    restart: unless-stopped  # Автоматический перезапуск
    depends_on:  # Зависимости от других сервисов
      - redis  # Redis должен быть запущен
      - db  # БД должна быть запущена
    environment:  # Переменные окружения
      DJANGO_SETTINGS_MODULE: cyber_threat_map.settings  # Настройки Django
      REDIS_URL: redis://redis:6379/0  # URL подключения к Redis
    volumes:  # Том для монтирования кода
      - ./backend:/app
    networks:  # Сеть для связи с другими сервисами
      - cyber_network
    command: >  # Команда запуска Celery worker
      sh -c "celery -A cyber_threat_map worker --loglevel=info"

# Определение сетей
networks:
  cyber_network:  # Сеть для связи всех сервисов
    driver: bridge  # Тип сети - мост (bridge)

# Определение томов для сохранения данных
volumes:
  postgres_data:  # Том для данных PostgreSQL
    driver: local  # Локальный драйвер хранения
  redis_data:  # Том для данных Redis
    driver: local  # Локальный драйвер хранения
  backend_staticfiles:  # Том для статических файлов Django
    driver: local  # Локальный драйвер хранения
  backend_logs:  # Том для логов приложения
    driver: local  # Локальный драйвер хранения
